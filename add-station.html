<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Добавление станции</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__left">
      <a href="dashboard.html" class="btn btn--text">← Назад</a>
      <span class="topbar__title">Админ панель</span>
    </div>
  </header>

<main class="page">
  <h1 class="title title--lg">Добавление станции</h1>

  <form id="station-form" class="form" novalidate>
    <div class="field">
      <label class="label" for="name">Название</label>
      <input class="input" id="name" type="text" placeholder="Введите название" required />
    </div>

    <div class="field">
      <label class="label" for="branch">Ветка</label>
      <input class="input" id="branch" type="text" placeholder="Введите ветку" />
    </div>

    <div class="field">
      <label class="label" for="description">Описание</label>
      <textarea class="input textarea" id="description" rows="4" placeholder="Введите описание"></textarea>
    </div>

    <div class="media-row">
      <span class="label label--inline">Загрузить фото</span>
      <input id="photo-input" class="hidden-file" type="file" accept="image/*" multiple />
      <button type="button" class="btn btn--grey" data-for="photo-input">Выберите файл</button>
    </div>
    <ul id="photo-list" class="stations-list"></ul>

    <div class="media-row">
      <span class="label label--inline">Загрузить видео</span>
      <input id="video-input" class="hidden-file" type="file" accept="video/*" multiple />
      <button type="button" class="btn btn--grey" data-for="video-input">Выберите файл</button>
    </div>
    <ul id="video-list" class="stations-list"></ul>

    <div class="media-row">
      <span class="label label--inline">Загрузить аудио</span>
      <input id="audio-input" class="hidden-file" type="file" accept="audio/*" multiple />
      <button type="button" class="btn btn--grey" data-for="audio-input">Выберите файл</button>
    </div>
    <ul id="audio-list" class="stations-list"></ul>

    <h2 class="title title--md center">Добавить достопримечательности</h2>

    <div class="station-builder">
      <div class="field">
        <label class="label" for="attractionId">ID достопримечательности</label>
        <input class="input" id="attractionId" type="number" min="0" placeholder="Введите ID" />
      </div>
      <div class="field" style="margin-bottom: 0;">
        <label class="label" for="attractionDistance">Расстояние</label>
        <input class="input" id="attractionDistance" type="number" min="0" placeholder="Введите расстояние, м" />
      </div>
      <button id="add-attraction-btn" type="button" class="btn btn--primary btn--narrow">Добавить</button>
    </div>

    <ul id="attractions-list" class="stations-list"></ul>

    <h2 class="title title--md center">Добавить вышки сотовой связи</h2>

    <div class="station-builder">
      <div class="field">
        <label class="label" for="towerMcc">MCC</label>
        <input class="input" id="towerMcc" type="text" placeholder="Введите MCC" />
      </div>
      <div class="field">
        <label class="label" for="towerMnc">MNC</label>
        <input class="input" id="towerMnc" type="text" placeholder="Введите MNC" />
      </div>
      <div class="field">
        <label class="label" for="towerCid">CID</label>
        <input class="input" id="towerCid" type="text" placeholder="Введите CID" />
      </div>
      <div class="field">
        <label class="label" for="towerLac">LAC</label>
        <input class="input" id="towerLac" type="text" placeholder="Введите LAC" />
      </div>
      <div class="field" style="margin-bottom: 0;">
        <label class="label" for="towerRadio">Radio</label>
        <input class="input" id="towerRadio" type="text" placeholder="Введите radio" />
      </div>
      <button id="add-tower-btn" type="button" class="btn btn--primary btn--narrow">Добавить</button>
    </div>

    <ul id="towers-list" class="stations-list"></ul>

    <div id="status" class="status" role="alert" hidden></div>

    <button id="submit-btn" type="submit" class="btn btn--primary btn--narrow submit-btn">Сохранить</button>
  </form>
</main>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="station.js"></script>
</body>
</html>
