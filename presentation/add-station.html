<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Добавление станции</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__left">
      <a href="dashboard.html" class="btn btn--text">← Назад</a>
      <span class="topbar__title">Админ панель</span>
    </div>
  </header>

<main class="page">
  <h1 class="title title--lg">Добавление станции</h1>
  
  <form id="station-form" class="form">
    <div class="field">
      <label class="label" for="name">Название</label>
      <input class="input" type="text" id="name" placeholder="Введите название" required>
    </div>

    <div class="field">
      <label class="label" for="branch">Ветка</label>
      <input class="input" type="text" id="branch" placeholder="Введите ветку">
    </div>



    <div class="field">
      <label class="label" for="description">Описание</label>
      <textarea class="input textarea" id="description" placeholder="Введите описание"></textarea>
    </div>

    <!-- Медиа -->
    <h2 class="title title--md">Медиа</h2>
    
    <div class="media-row">
      <label class="label label--inline">Фото:</label>
      <input type="file" id="photo-input" class="hidden-file" multiple accept="image/*">
      <button type="button" class="btn btn--grey" data-for="photo-input">Выбрать файлы</button>
      <button type="button" class="btn btn--view btn--small" data-type="PHOTO" id="photo-view-btn" disabled>Посмотреть медиа</button>
    </div>
    <span id="photo-count" class="hint" hidden></span>

    <div class="media-row">
      <label class="label label--inline">Видео:</label>
      <input type="file" id="video-input" class="hidden-file" multiple accept="video/*">
      <button type="button" class="btn btn--grey" data-for="video-input">Выбрать файлы</button>
      <button type="button" class="btn btn--view btn--small" data-type="VIDEO" id="video-view-btn" disabled>Посмотреть медиа</button>
    </div>
    <span id="video-count" class="hint" hidden></span>

    <div class="media-row">
      <label class="label label--inline">Аудио:</label>
      <input type="file" id="audio-input" class="hidden-file" multiple accept="audio/*">
      <button type="button" class="btn btn--grey" data-for="audio-input">Выбрать файлы</button>
      <button type="button" class="btn btn--view btn--small" data-type="AUDIO" id="audio-view-btn" disabled>Посмотреть медиа</button>
    </div>
    <span id="audio-count" class="hint" hidden></span>

    <!-- Вышки -->
    <h2 class="title title--md">Вышки сотовой связи</h2>
    <div class="station-builder">
      <div class="field"><input class="input" type="text" id="towerMcc" placeholder="MCC"></div>
      <div class="field"><input class="input" type="text" id="towerMnc" placeholder="MNC"></div>
      <div class="field"><input class="input" type="text" id="towerCid" placeholder="CID"></div>
      <div class="field"><input class="input" type="text" id="towerLac" placeholder="LAC"></div>
      <div class="field"><input class="input" type="text" id="towerRadio" placeholder="Radio"></div>
      <button type="button" id="add-tower-btn" class="btn btn--primary btn--narrow">Добавить вышку</button>
    </div>
    <ul id="towers-list" class="stations-list"></ul>

    <!-- Достопримечательности -->
    <h2 class="title title--md">Достопримечательности</h2>
    <div class="station-builder">
      <div class="field"><input class="input" type="number" id="attractionId" placeholder="ID достопримечательности"></div>
      <div class="field"><input class="input" type="number" id="attractionDistance" placeholder="Расстояние (м)"></div>
      <button type="button" id="add-attraction-btn" class="btn btn--primary btn--narrow">Добавить</button>
    </div>
    <ul id="attractions-list" class="stations-list"></ul>

    <button type="submit" id="submit-btn" class="btn btn--primary btn--block submit-btn">Сохранить</button>
    <div id="status" class="status" hidden></div>
  </form>
</main>

<!-- Модальное окно медиа (обязательно должно быть в body) -->
<div id="media-modal" class="modal" hidden>
  <div class="modal__backdrop"></div>
  <div class="modal__dialog">
    <div class="modal__head">
      <h3 id="media-modal-title" class="modal__title">Медиа</h3>
      <button id="media-modal-close" class="modal__close">&times;</button>
    </div>
    <div id="media-modal-body" class="modal__body"></div>
  </div>
</div>

  <script src="../config/config.js"></script>
  <script src="../api/api.js"></script>
  <script src="../logic/station.js"></script>
</body>
</html>
